<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mein Portfolio | Testseite</title>
    <style>
        :root {
            --bg-color: #0f172a;
            --text-color: #e2e8f0;
            --accent-color: #38bdf8;
            --card-bg: #1e293b;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .container {
            max-width: 600px;
            padding: 30px;
            background-color: var(--card-bg);
            border-radius: 12px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.3);
            text-align: center;
            border: 1px solid #334155;
        }

        h1 {
            color: #ffffff;
            margin-bottom: 10px;
            font-size: 2rem;
        }

        .subtitle {
            color: var(--accent-color);
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 20px;
            font-size: 0.9rem;
        }

        p {
            line-height: 1.6;
            color: #94a3b8;
            margin-bottom: 30px;
        }

        .links {
            display: flex;
            justify-content: center;
            gap: 15px;
            flex-wrap: wrap;
        }

        .btn {
            display: inline-block;
            padding: 10px 20px;
            border-radius: 6px;
            text-decoration: none;
            font-weight: bold;
            transition: all 0.2s ease;
        }

        .btn-github {
            background-color: #24292e;
            color: #fff;
            border: 1px solid #444;
        }

        .btn-github:hover {
            background-color: #333;
        }

        .btn-thm {
            background-color: #9400d3;
            color: #fff;
        }

        .btn-thm:hover {
            background-color: #b026ff;
        }

        .status-badge {
            background-color: #10b981;
            color: #fff;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 0.8rem;
            display: inline-block;
            margin-bottom: 20px;
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="status-badge">✓ Live & Erfolgreich verbunden</div>
        <h1>Hallo, Welt!</h1>
        <div class="subtitle">Software & Cybersecurity Portfolio</div>
        
        <p>
            Wenn du diese Seite siehst, funktioniert dein Hosting über GitHub Pages und deine Domain-Verknüpfung war erfolgreich! Das ist das Fundament für dein zukünftiges Portfolio.
        </p>

        <div class="links">
            <a href="#" target="_blank" class="btn btn-github">Mein GitHub</a>
            <a href="#" target="_blank" class="btn btn-thm">Mein TryHackMe</a>
        </div>
    </div>

</body>
</html>
